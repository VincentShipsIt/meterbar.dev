name: E2E (daily)

# The repo's scheduled defense-in-depth workflow. Per-PR `ci.yml` now includes
# the full universal app/widget build in its required `build` context; this job
# repeats the full fixture suite, coverage gate, and Xcode build on a daily cadence.
# Fixtures only — no Claude/OpenAI credentials.
#
# 09:17 UTC daily (off the :00 mark on purpose). Also runnable on demand.
on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Full suite + coverage + app/widget build
    runs-on: macos-26
    timeout-minutes: 40
    env:
      # Keep in parity with ci.yml and _build-signed.yml. The signed-release
      # workflow contract verifier fails PR CI if any broad gate drifts.
      COVERAGE_THRESHOLD: 19

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Full test suite + coverage gate (fixtures only)
        # Same gate as CI: real `swift test` (any failure fails the run) + the
        # llvm-cov coverage floor. Network-touching tests self-skip without creds.
        run: bash scripts/check-coverage.sh

      - name: Build app + widget
        # Scheduled safety net in addition to the required per-PR Xcode build.
        run: |
          xcodebuild -project MeterBar.xcodeproj \
            -scheme MeterBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
