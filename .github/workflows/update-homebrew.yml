name: Update Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., v1.0.0)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          # Remove 'v' prefix for formula version
          FORMULA_VERSION="${VERSION#v}"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "formula=$FORMULA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download SHA256
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.tag }}"
          # --fail so a missing/404 asset is an error (not a 0-exit with an HTML error body),
          # mirroring secret-scan.yml's curl usage.
          curl --fail --location --silent --show-error \
            "https://github.com/VincentShipsIt/meterbar.app/releases/download/${VERSION}/MeterBar-${VERSION}.zip.sha256" \
            -o sha256.txt
          # Validate the payload is a bare 64-hex SHA256 before it is written into the cask;
          # otherwise an unexpected body would be committed as the hash and break `brew install`.
          SHA256=$(tr -d '[:space:]' < sha256.txt)
          if [[ ! "$SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Downloaded sha256 is not a valid 64-hex digest: '$SHA256'" >&2
            exit 1
          fi
          echo "SHA256: $SHA256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
        id: sha

      - name: Checkout homebrew-tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: VincentShipsIt/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        run: |
          cd homebrew-tap
          VERSION="${{ steps.version.outputs.formula }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/meterbar.rb

          # Update sha256
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/meterbar.rb

          echo "Updated formula:"
          cat Casks/meterbar.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/meterbar.rb
          git diff --staged --quiet || git commit -m "Update meterbar to ${{ steps.version.outputs.tag }}"
          git push
