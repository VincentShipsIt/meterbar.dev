name: Update Homebrew

on:
  # Called automatically by the Release workflow after it publishes a tag.
  # (A `release: published` trigger does NOT work here: the release is created
  # by the Release job's GITHUB_TOKEN, and GitHub will not cascade-trigger
  # workflows from that token — so the tap would silently never update.)
  workflow_call:
    inputs:
      version:
        description: 'Version to update (e.g., v1.0.0)'
        required: true
        type: string
  # Manual fallback / re-run.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., v1.0.0)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout validation tooling
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          FORMULA_VERSION=$(scripts/validate-release-tag.sh "$INPUT_VERSION")
          {
            echo "tag=$INPUT_VERSION"
            echo "formula=$FORMULA_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Download SHA256
        id: sha
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          curl -fsSL \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "https://github.com/${RELEASE_REPOSITORY}/releases/download/${RELEASE_TAG}/MeterBar-${RELEASE_TAG}.zip.sha256" \
            -o sha256.txt
          # Validate the asset is a bare 64-hex SHA256 before trusting it. On a 404 or
          # redirect-to-error, curl -f fails the step; this guards the case where a 200
          # body is something other than a digest, so an error body can never be
          # committed into the cask and break every `brew install` checksum check.
          SHA256=$(tr -d '[:space:]' < sha256.txt)
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::Downloaded sha256 is not a valid 64-hex digest"; exit 1; }
          echo "SHA256: $SHA256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: VincentShipsIt/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        env:
          FORMULA_VERSION: ${{ steps.version.outputs.formula }}
          RELEASE_SHA256: ${{ steps.sha.outputs.sha256 }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          scripts/update-homebrew-cask.sh \
            homebrew-tap/Casks/meterbar.rb \
            "$FORMULA_VERSION" \
            "$RELEASE_SHA256" \
            "$RELEASE_REPOSITORY"

          echo "Updated formula:"
          cat homebrew-tap/Casks/meterbar.rb

      - name: Commit and push
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/meterbar.rb
          git diff --staged --quiet || git commit -m "Update meterbar to ${RELEASE_TAG}"
          git push
