name: Update Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., v1.0.0)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          # Remove 'v' prefix for formula version
          FORMULA_VERSION="${VERSION#v}"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "formula=$FORMULA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download SHA256
        id: sha
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.tag }}"
          curl -fsSL \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "https://github.com/VincentShipsIt/meterbar.app/releases/download/${VERSION}/MeterBar-${VERSION}.zip.sha256" \
            -o sha256.txt
          # Validate the asset is a bare 64-hex SHA256 before trusting it. On a 404 or
          # redirect-to-error, curl -f fails the step; this guards the case where a 200
          # body is something other than a digest, so an error body can never be
          # committed into the cask and break every `brew install` checksum check.
          SHA256=$(tr -d '[:space:]' < sha256.txt)
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::Downloaded sha256 is not a valid 64-hex digest"; exit 1; }
          echo "SHA256: $SHA256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: VincentShipsIt/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        run: |
          cd homebrew-tap
          VERSION="${{ steps.version.outputs.formula }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/meterbar.rb

          # Update sha256
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/meterbar.rb

          echo "Updated formula:"
          cat Casks/meterbar.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/meterbar.rb
          git diff --staged --quiet || git commit -m "Update meterbar to ${{ steps.version.outputs.tag }}"
          git push
