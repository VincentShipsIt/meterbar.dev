name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# The branch-protection-required `build` context includes the full Xcode app and
# widget build. This keeps entry-point, project wiring, entitlements, and widget
# regressions from merging behind a SwiftPM-only green check.

jobs:
  # Required PR gate. Keep this job name stable for branch protection.
  build:
    name: build
    needs: [test, lint]
    if: ${{ always() }}
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Require tests and lint
        env:
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          set -euo pipefail
          if [[ "$TEST_RESULT" != "success" || "$LINT_RESULT" != "success" ]]; then
            echo "::error::Required prerequisites failed (tests=$TEST_RESULT, lint=$LINT_RESULT)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test Swift build parity validation
        run: scripts/test-swift-build-parity.sh

      - name: Verify Debug and Release identities
        run: scripts/verify-build-identities.sh

      - name: Test release tag validation
        run: scripts/test-release-tag.sh

      - name: Test release ancestry validation
        run: scripts/test-release-ancestry.sh

      - name: Verify signed-release workflow contract
        run: scripts/verify-release-workflow-contract.sh

      - name: Test Homebrew cask update
        run: scripts/test-update-homebrew-cask.sh

      - name: Test CLI JSON smoke validator
        run: scripts/test-cli-json-smoke.sh

      - name: Verify canonical repository URLs
        run: scripts/verify-canonical-repository-urls.sh

      - name: Build library (SwiftPM)
        run: swift build

      - name: Build Debug app and widget (Xcode)
        run: |
          set -euo pipefail
          xcodebuild -project MeterBar.xcodeproj \
            -scheme MeterBar \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/MeterBarDebugDerivedData" \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build universal app and widget (Xcode)
        run: |
          set -euo pipefail
          xcodebuild -project MeterBar.xcodeproj \
            -scheme MeterBar \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/MeterBarDerivedData" \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build and inject universal CLI
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/MeterBarDerivedData/Build/Products/Release/MeterBar.app"
          scripts/build-universal-cli.sh \
            "$APP_PATH/Contents/Helpers/meterbar" \
            "$RUNNER_TEMP/MeterBarCLIBuild"

      - name: Verify universal nested bundle
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/MeterBarDerivedData/Build/Products/Release/MeterBar.app"
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          scripts/sign-and-verify-release.sh "$APP_PATH" "$APP_VERSION"

      - name: Smoke public CLI JSON commands
        run: |
          APP_PATH="$RUNNER_TEMP/MeterBarDerivedData/Build/Products/Release/MeterBar.app"
          scripts/verify-cli-json-smoke.sh "$APP_PATH/Contents/Helpers/meterbar"

  test:
    name: Tests + coverage gate
    runs-on: macos-26
    timeout-minutes: 20
    env:
      # Coverage floor enforced by scripts/check-coverage.sh. Baseline was 9.0% on
      # 2026-07-02; the service-layer test pass (#71 Tier 3a, 2026-07-03) raised the
      # measured line coverage to 19.2% by seaming + fixture-testing KeychainManager,
      # SharedDataStore, Codex/Cursor mapping + auth, UsageDataManager orchestration,
      # and the Codex cost scan. Floor sits just under the measured baseline as a
      # regression gate. Ratchet this up as coverage improves; never lower it to make
      # a PR pass.
      # Keep this value in parity with e2e.yml and _build-signed.yml; the
      # signed-release workflow contract check fails CI if they drift.
      COVERAGE_THRESHOLD: 19

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Run tests with coverage gate
        # check-coverage.sh runs `swift test --enable-code-coverage` (a real gate —
        # any test failure fails this step) and then enforces COVERAGE_THRESHOLD
        # via llvm-cov. Network-touching tests self-skip without credentials
        # (XCTSkip in APIIntegrationTests).
        run: bash scripts/check-coverage.sh

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10
    env:
      SWIFTLINT_VERSION: 0.65.0
      SWIFTLINT_SHA256: d6cb0aa7a2f5f1ef306fc9e37bcb54dc9a26facc8f7784ac0c3dd3eccf5c6ba6

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install SwiftLint (pinned + checksum-verified)
        run: |
          set -euo pipefail
          URL="https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          curl --fail --location --silent --show-error \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "$URL" -o /tmp/swiftlint.zip
          echo "${SWIFTLINT_SHA256}  /tmp/swiftlint.zip" | shasum -a 256 --check --strict
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          chmod +x /tmp/swiftlint/swiftlint

      - name: Lint
        # --strict: the tree is currently violation-free, so any new warning fails.
        run: /tmp/swiftlint/swiftlint lint --strict
