name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Pull requests run only the FAST gates below (SwiftPM build + tests + lint,
# ~1 min total). The heavy `xcodebuild` app+widget build is expensive and only
# ever breaks on project-file / widget-target changes, so it runs on pushes to
# master (post-merge) rather than on every PR.

jobs:
  # Required PR gate. Named "build" to satisfy branch protection. Fast: compiles
  # the SwiftPM library (Models/Services/Views against MeterBarShared) and the
  # CLI, without building the full .app / widget bundle.
  build:
    name: build
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Build library (SwiftPM)
        run: swift build

      - name: Build CLI
        run: |
          cd MeterBarCLI
          swift build

  test:
    name: Tests + coverage gate
    runs-on: macos-26
    timeout-minutes: 20
    env:
      # Coverage floor enforced by scripts/check-coverage.sh. Baseline was 9.0% on
      # 2026-07-02; the service-layer test pass (#71 Tier 3a, 2026-07-03) raised the
      # measured line coverage to 19.2% by seaming + fixture-testing KeychainManager,
      # SharedDataStore, Codex/Cursor mapping + auth, UsageDataManager orchestration,
      # and the Codex cost scan. Floor sits just under the measured baseline as a
      # regression gate. Ratchet this up as coverage improves; never lower it to make
      # a PR pass.
      COVERAGE_THRESHOLD: 19

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Run tests with coverage gate
        # check-coverage.sh runs `swift test --enable-code-coverage` (a real gate —
        # any test failure fails this step) and then enforces COVERAGE_THRESHOLD
        # via llvm-cov. Network-touching tests self-skip without credentials
        # (XCTSkip in APIIntegrationTests).
        run: bash scripts/check-coverage.sh

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10
    env:
      SWIFTLINT_VERSION: 0.65.0
      SWIFTLINT_SHA256: d6cb0aa7a2f5f1ef306fc9e37bcb54dc9a26facc8f7784ac0c3dd3eccf5c6ba6

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install SwiftLint (pinned + checksum-verified)
        run: |
          set -euo pipefail
          URL="https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          curl --fail --location --silent --show-error \
            --connect-timeout 15 --max-time 120 --retry 3 \
            "$URL" -o /tmp/swiftlint.zip
          echo "${SWIFTLINT_SHA256}  /tmp/swiftlint.zip" | shasum -a 256 --check --strict
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          chmod +x /tmp/swiftlint/swiftlint

      - name: Lint
        # --strict: the tree is currently violation-free, so any new warning fails.
        run: /tmp/swiftlint/swiftlint lint --strict

  # Full app + widget build via xcodebuild. Slow (~3 min) and only sensitive to
  # project-file / widget-target changes, so it runs on pushes to master rather
  # than on every PR. This is where the .xcodeproj SwiftPM package wiring
  # (MeterBarShared linked into both the app and the widget target) is exercised.
  xcode-build:
    name: Build (app + widget)
    if: github.event_name == 'push'
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild -project MeterBar.xcodeproj \
            -scheme MeterBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
